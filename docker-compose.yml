services:
  postgres:
    image: postgres:16
    container_name: vidara_postgres
    environment:
      POSTGRES_USER: vidara
      POSTGRES_PASSWORD: vidara
      POSTGRES_DB: vidara
    ports:
      - "5432:5432"
    volumes:
      - vidara_pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: vidara_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - vidara_qdrant:/qdrant/storage

volumes:
  vidara_pgdata:
  vidara_qdrant:
